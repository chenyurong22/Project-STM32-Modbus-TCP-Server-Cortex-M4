name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strict-build:
    name: ${{ matrix.compiler }} strict build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Run Make verification
        env:
          CC: ${{ matrix.compiler }}
        run: make ci

  cmake:
    name: CMake and CTest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-cmake -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-cmake --parallel
      - name: Test
        run: ctest --test-dir build-cmake --output-on-failure

  sanitizers:
    name: Address and undefined behavior sanitizers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run sanitizer verification
        env:
          CFLAGS: >-
            -O1 -g -std=c11 -Wall -Wextra -Wpedantic -Wconversion
            -Wsign-conversion -Wshadow -Werror -fsanitize=address,undefined
            -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
        run: make ci
