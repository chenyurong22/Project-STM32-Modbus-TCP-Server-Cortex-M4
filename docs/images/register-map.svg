<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
  <title id="title">Default Modbus register map</title>
  <desc id="desc">Four configurable banks for coils, discrete inputs, holding registers and input registers.</desc>
  <rect width="1100" height="500" rx="22" fill="#f6f9fb"/>
  <text x="550" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#173b4a">Default in-memory data model</text>
  <text x="550" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5a7681">Each bank size is configurable in App/include/platform_port.h</text>

  <g transform="translate(75 118)" font-family="Arial, sans-serif">
    <g><rect width="220" height="290" rx="18" fill="#e8f7fc" stroke="#49a8c8" stroke-width="2"/><text x="110" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#173b4a">Coils</text><text x="110" y="70" text-anchor="middle" font-size="15" fill="#53717e">0xxxx • read/write bits</text><rect x="28" y="96" width="164" height="148" rx="12" fill="#ffffff"/><g fill="#3e6b7b" font-size="14"><text x="50" y="127">Address 0</text><text x="50" y="157">Address 1</text><text x="50" y="187">⋮</text><text x="50" y="217">Address 255</text></g><g fill="#3aaf78"><circle cx="168" cy="122" r="9"/><circle cx="168" cy="152" r="9"/><circle cx="168" cy="212" r="9"/></g><text x="110" y="274" text-anchor="middle" font-size="14" fill="#53717e">FC 01 / 05 / 0F</text></g>
    <g transform="translate(250 0)"><rect width="220" height="290" rx="18" fill="#eef8f3" stroke="#4ca97f" stroke-width="2"/><text x="110" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#173b4a">Discrete inputs</text><text x="110" y="70" text-anchor="middle" font-size="15" fill="#53717e">1xxxx • read-only remotely</text><rect x="28" y="96" width="164" height="148" rx="12" fill="#ffffff"/><g fill="#3e6b7b" font-size="14"><text x="50" y="127">Address 0</text><text x="50" y="157">Address 1</text><text x="50" y="187">⋮</text><text x="50" y="217">Address 255</text></g><g fill="#4fa6d5"><circle cx="168" cy="122" r="9"/><circle cx="168" cy="152" r="9"/><circle cx="168" cy="212" r="9"/></g><text x="110" y="274" text-anchor="middle" font-size="14" fill="#53717e">FC 02</text></g>
    <g transform="translate(500 0)"><rect width="220" height="290" rx="18" fill="#fff5e9" stroke="#d89b45" stroke-width="2"/><text x="110" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#173b4a">Holding registers</text><text x="110" y="70" text-anchor="middle" font-size="15" fill="#53717e">4xxxx • read/write 16-bit</text><rect x="28" y="96" width="164" height="148" rx="12" fill="#ffffff"/><g fill="#3e6b7b" font-size="14"><text x="50" y="127">0 → 0x0000</text><text x="50" y="157">1 → 0x0000</text><text x="50" y="187">⋮</text><text x="50" y="217">255 → 0x0000</text></g><text x="110" y="274" text-anchor="middle" font-size="14" fill="#53717e">FC 03 / 06 / 10</text></g>
    <g transform="translate(750 0)"><rect width="220" height="290" rx="18" fill="#f3edff" stroke="#9168c8" stroke-width="2"/><text x="110" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#173b4a">Input registers</text><text x="110" y="70" text-anchor="middle" font-size="15" fill="#53717e">3xxxx • read-only remotely</text><rect x="28" y="96" width="164" height="148" rx="12" fill="#ffffff"/><g fill="#3e6b7b" font-size="14"><text x="50" y="127">0 → sensor</text><text x="50" y="157">1 → sensor</text><text x="50" y="187">⋮</text><text x="50" y="217">255 → sensor</text></g><text x="110" y="274" text-anchor="middle" font-size="14" fill="#53717e">FC 04</text></g>
  </g>
  <text x="550" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5a7681">Protocol addresses are zero-based; client tools may display traditional 1xxxx / 3xxxx / 4xxxx notation.</text>
</svg>
