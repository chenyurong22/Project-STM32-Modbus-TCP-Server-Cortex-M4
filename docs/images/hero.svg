<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">STM32 Modbus TCP Server</title>
  <desc id="desc">An STM32 microcontroller board connected over Ethernet to industrial clients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a2c"/>
      <stop offset="1" stop-color="#123e52"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f9d74"/>
      <stop offset="1" stop-color="#0b624a"/>
    </linearGradient>
</defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="65" r="115" fill="#2bb5d6" opacity="0.12"/>
  <circle cx="1015" cy="365" r="150" fill="#28d094" opacity="0.09"/>

  <g transform="translate(70 72)">
    <text x="0" y="0" fill="#8be7ff" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">EMBEDDED INDUSTRIAL ETHERNET</text>
    <text x="0" y="64" fill="#ffffff" font-family="Arial, sans-serif" font-size="50" font-weight="700">STM32 Modbus TCP Server</text>
    <text x="0" y="108" fill="#c9e7ef" font-family="Arial, sans-serif" font-size="20">Portable C11 protocol core • lwIP raw API transport</text>
    <text x="0" y="137" fill="#c9e7ef" font-family="Arial, sans-serif" font-size="20">Deterministic register map • no heap in the request path</text>
    <g transform="translate(0 175)">
      <rect width="168" height="42" rx="21" fill="#173f53" stroke="#56c7e3"/>
      <text x="84" y="27" text-anchor="middle" fill="#dff9ff" font-family="Arial, sans-serif" font-size="15" font-weight="700">FC 01/02/03/04</text>
      <rect x="182" width="168" height="42" rx="21" fill="#173f53" stroke="#56c7e3"/>
      <text x="266" y="27" text-anchor="middle" fill="#dff9ff" font-family="Arial, sans-serif" font-size="15" font-weight="700">FC 05/06/0F/10</text>
      <rect x="364" width="142" height="42" rx="21" fill="#173f53" stroke="#56c7e3"/>
      <text x="435" y="27" text-anchor="middle" fill="#dff9ff" font-family="Arial, sans-serif" font-size="15" font-weight="700">No heap</text>
    </g>
    <text x="0" y="286" fill="#9fc5d0" font-family="Arial, sans-serif" font-size="17">Verified with strict compiler warnings, unit tests, and a real TCP socket smoke test.</text>
  </g>

  <g transform="translate(790 78)">
    <rect x="0" y="35" width="300" height="230" rx="24" fill="url(#board)" stroke="#66efbf" stroke-width="3"/>
    <rect x="92" y="92" width="116" height="116" rx="12" fill="#142b35" stroke="#a7d7df" stroke-width="2"/>
    <text x="150" y="144" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Cortex‑M4</text>
    <text x="150" y="170" text-anchor="middle" fill="#9ed7e1" font-family="Arial, sans-serif" font-size="14">STM32 + lwIP</text>
    <g fill="#d7b45a">
      <rect x="24" y="58" width="18" height="12" rx="2"/><rect x="52" y="58" width="18" height="12" rx="2"/>
      <rect x="80" y="58" width="18" height="12" rx="2"/><rect x="108" y="58" width="18" height="12" rx="2"/>
      <rect x="136" y="58" width="18" height="12" rx="2"/><rect x="164" y="58" width="18" height="12" rx="2"/>
      <rect x="192" y="58" width="18" height="12" rx="2"/><rect x="220" y="58" width="18" height="12" rx="2"/>
      <rect x="248" y="58" width="18" height="12" rx="2"/>
      <rect x="24" y="232" width="18" height="12" rx="2"/><rect x="52" y="232" width="18" height="12" rx="2"/>
      <rect x="80" y="232" width="18" height="12" rx="2"/><rect x="108" y="232" width="18" height="12" rx="2"/>
      <rect x="136" y="232" width="18" height="12" rx="2"/><rect x="164" y="232" width="18" height="12" rx="2"/>
      <rect x="192" y="232" width="18" height="12" rx="2"/><rect x="220" y="232" width="18" height="12" rx="2"/>
      <rect x="248" y="232" width="18" height="12" rx="2"/>
    </g>
    <rect x="232" y="108" width="54" height="82" rx="7" fill="#d5dbe0"/>
    <rect x="242" y="120" width="34" height="42" rx="3" fill="#25353d"/>
    <path d="M286 149 H340" stroke="#74dcff" stroke-width="7" stroke-linecap="round"/>
    <path d="M326 134 L345 149 L326 164" fill="none" stroke="#74dcff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="48" cy="112" r="11" fill="#ffdf57"/><circle cx="48" cy="151" r="11" fill="#67f1a8"/><circle cx="48" cy="190" r="11" fill="#77bfff"/>
  </g>
</svg>
