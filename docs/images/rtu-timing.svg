<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Modbus RTU T1.5 and T3.5 receive timing</title>
  <desc id="desc">A valid frame ends after T3.5 silence. A byte arriving after T1.5 but before T3.5 invalidates the current frame.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#416b7c"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="24" fill="#f4f8fa"/>
  <text x="600" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#173b4a">RTU receive timing with a fixed 50 μs tick</text>

  <text x="70" y="105" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#173b4a">Valid frame boundary</text>
  <line x1="70" y1="170" x2="1120" y2="170" stroke="#416b7c" stroke-width="3" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">
    <rect x="105" y="132" width="72" height="54" rx="10" fill="#2f7f99"/><text x="141" y="166" text-anchor="middle">Byte 1</text>
    <rect x="205" y="132" width="72" height="54" rx="10" fill="#2f7f99"/><text x="241" y="166" text-anchor="middle">Byte 2</text>
    <rect x="305" y="132" width="72" height="54" rx="10" fill="#2f7f99"/><text x="341" y="166" text-anchor="middle">Byte N</text>
  </g>
  <line x1="377" y1="112" x2="610" y2="112" stroke="#d6a344" stroke-width="4"/>
  <line x1="610" y1="96" x2="610" y2="192" stroke="#d6a344" stroke-width="3" stroke-dasharray="8 6"/>
  <line x1="860" y1="96" x2="860" y2="192" stroke="#48a981" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="494" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8a6728">silence</text>
  <text x="610" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#8a6728">T1.5 crossed</text>
  <text x="860" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#287658">T3.5 reached</text>
  <rect x="875" y="125" width="220" height="70" rx="14" fill="#e9f8f2" stroke="#48a981" stroke-width="2"/>
  <text x="985" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#173b4a">Publish completed frame</text>
  <text x="985" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#52717e">main loop validates CRC/PDU</text>

  <text x="70" y="285" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#173b4a">Invalid inter-character gap</text>
  <line x1="70" y1="350" x2="1120" y2="350" stroke="#416b7c" stroke-width="3" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">
    <rect x="105" y="312" width="72" height="54" rx="10" fill="#2f7f99"/><text x="141" y="346" text-anchor="middle">Byte 1</text>
    <rect x="205" y="312" width="72" height="54" rx="10" fill="#2f7f99"/><text x="241" y="346" text-anchor="middle">Byte 2</text>
    <rect x="690" y="312" width="92" height="54" rx="10" fill="#c65c5c"/><text x="736" y="346" text-anchor="middle">Late byte</text>
  </g>
  <line x1="277" y1="292" x2="520" y2="292" stroke="#d6a344" stroke-width="4"/>
  <line x1="520" y1="276" x2="520" y2="372" stroke="#d6a344" stroke-width="3" stroke-dasharray="8 6"/>
  <line x1="850" y1="276" x2="850" y2="372" stroke="#48a981" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="520" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#8a6728">T1.5</text>
  <text x="850" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#287658">T3.5</text>
  <path d="M736 380 C760 435, 850 438, 890 392" fill="none" stroke="#c65c5c" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="890" y="365" width="205" height="70" rx="14" fill="#fff0f0" stroke="#c65c5c" stroke-width="2"/>
  <text x="992" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#8d3434">Drop the whole frame</text>
  <text x="992" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#7a5555">recover after T3.5 silence</text>

  <text x="600" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#52717e">The ISR only stores bytes, advances counters, flags invalid gaps/overflow, and publishes a buffer at T3.5.</text>
</svg>
